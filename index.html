<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart Geo Analysis Dashboard</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css"/>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
        }

        header {
            padding: 15px;
            text-align: center;
            background: #1e293b;
            font-size: 22px;
            font-weight: bold;
        }

        #map {
            height: 80vh;
            width: 100%;
        }

        .features {
            padding: 15px;
            background: #111827;
        }

        .feature-box {
            display: inline-block;
            padding: 10px 15px;
            margin: 5px;
            background: #2563eb;
            border-radius: 8px;
            cursor: pointer;
        }

        .feature-box:hover {
            background: #1d4ed8;
        }
    </style>
</head>

<body>

<header>
    🌍 Geo Analysis Dashboard (QGIS Powered)
</header>

<div id="map"></div>

<div class="features">
    <h3>Features</h3>
    <div class="feature-box">🚗 Road Network Analysis</div>
    <div class="feature-box">🌱 NDVI Vegetation Analysis</div>
    <div class="feature-box">📍 Node Mapping</div>
</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"></script>

<script>
    // Initialize map
    var map = L.map('map').setView([12.9835, 77.7427], 13);

    // Base map
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: "© OpenStreetMap"
    }).addTo(map);

    // Example marker (you can replace with your data)
    L.marker([12.9835, 77.7427]).addTo(map)
        .bindPopup("Center Point")
        .openPopup();

    // You can load your GeoJSON here later
    /*
    fetch('data/roads.geojson')
    .then(res => res.json())
    .then(data => {
        L.geoJSON(data).addTo(map);
    });
    */
</script>

</body>
</html>
