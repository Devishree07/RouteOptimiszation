<!DOCTYPE html>
<html>
<head>
  <title>QGIS Data</title>
  <style>
    body { font-family: Arial; padding: 20px; background: #f9f9f9; }
    h2 { color: #333; }
    table { border-collapse: collapse; width: 100%; background: white; }
    th { background: #4CAF50; color: white; padding: 10px; text-align: left; }
    td { border: 1px solid #ddd; padding: 8px; }
    tr:nth-child(even) { background: #f2f2f2; }
    tr:hover { background: #dff0d8; }
  </style>
</head>
<body>
  <h2>QGIS Data Viewer</h2>
  <div id="output">Loading data...</div>

  <script>
    fetch('data.geojson')
      .then(res => res.json())
      .then(data => {
        const features = data.features;
        if (!features.length) {
          document.getElementById('output').innerHTML = 'No data found.';
          return;
        }

        const keys = Object.keys(features[0].properties);
        let html = '<table><tr>' + keys.map(k => `<th>${k}</th>`).join('') + '</tr>';

        features.forEach(f => {
          html += '<tr>' + keys.map(k => `<td>${f.properties[k] ?? ''}</td>`).join('') + '</tr>';
        });

        html += '</table>';
        document.getElementById('output').innerHTML = html;
      })
      .catch(() => {
        document.getElementById('output').innerHTML = 'Error loading data.geojson';
      });
  </script>
</body>
</html>
