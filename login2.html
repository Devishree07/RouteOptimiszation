<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>WasteTrack — Login</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  html, body {
    height: 100%; width: 100%;
    font-family: 'Roboto', Arial, sans-serif;
    overflow: hidden;
    background: #0a0e1a;
    color: #fff;
  }

  /* ── ANIMATED MAP-LIKE BACKGROUND ── */
  .bg {
    position: fixed; inset: 0; z-index: 0;
    background-color: #1a2332;
    overflow: hidden;
  }

  /* road lines */
  .bg::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,200,100,0.12) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,200,100,0.12) 1px, transparent 1px),
      linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size: 120px 120px, 120px 120px, 30px 30px, 30px 30px;
    animation: gridDrift 30s linear infinite;
  }
  @keyframes gridDrift {
    from { background-position: 0 0, 0 0, 0 0, 0 0; }
    to   { background-position: 120px 120px, 120px 120px, 30px 30px, 30px 30px; }
  }

  /* green patches (parks) */
  .bg::after {
    content: '';
    position: absolute; inset: 0;
    background-image:
      radial-gradient(ellipse 180px 120px at 20% 30%, rgba(56,142,60,0.18) 0%, transparent 70%),
      radial-gradient(ellipse 220px 150px at 75% 60%, rgba(56,142,60,0.14) 0%, transparent 70%),
      radial-gradient(ellipse 100px 80px at 50% 80%, rgba(56,142,60,0.12) 0%, transparent 70%);
  }

  /* blue water patches */
  .water1, .water2 {
    position: absolute;
    border-radius: 40% 60% 55% 45%;
    background: rgba(33,150,243,0.12);
    animation: wobble 8s ease-in-out infinite;
  }
  .water1 { width:180px; height:90px; top:55%; left:40%; animation-delay:0s; }
  .water2 { width:120px; height:60px; top:20%; left:65%; animation-delay:3s; }
  @keyframes wobble {
    0%,100% { transform: scale(1) rotate(0deg); }
    50%      { transform: scale(1.05) rotate(3deg); }
  }

  /* diagonal roads */
  .road {
    position: absolute;
    background: rgba(255,200,80,0.15);
    transform-origin: center;
  }
  .road1 { width:4px; height:200%; top:-50%; left:35%; transform:rotate(25deg); }
  .road2 { width:3px; height:200%; top:-50%; left:60%; transform:rotate(-15deg); }
  .road3 { width:100%; height:3px; top:45%; left:0; }
  .road4 { width:100%; height:2px; top:70%; left:0; opacity:0.6; }

  /* dark overlay */
  .overlay {
    position: fixed; inset: 0; z-index: 1;
    background: linear-gradient(
      160deg,
      rgba(10,14,26,0.55) 0%,
      rgba(10,14,26,0.65) 50%,
      rgba(10,14,26,0.92) 100%
    );
  }

  /* ── SHELL ── */
  .shell {
    position: relative; z-index: 2;
    display: flex; flex-direction: column;
    height: 100vh;
  }

  /* ── TOP BAR ── */
  .topbar {
    height: 50px; flex-shrink: 0;
    background: rgba(10,14,26,0.92);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    display: flex; align-items: center;
    padding: 0 20px; gap: 10px;
  }
  .tb-brand { font-size: 15px; font-weight: 700; letter-spacing: 0.4px; }
  .tb-sub   { font-size: 12px; color: rgba(255,255,255,0.3); }
  .tb-space { flex: 1; }
  .tb-dot   {
    width: 7px; height: 7px; border-radius: 50%;
    background: #4caf50; box-shadow: 0 0 7px #4caf50;
    animation: blink 2s infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
  .tb-live  { font-size: 11px; color: #4caf50; font-weight: 600; }

  /* ── CENTER ── */
  .center {
    flex: 1;
    display: flex; align-items: center; justify-content: center;
    padding: 16px;
  }

  /* ── CARD ── */
  .card {
    width: 100%; max-width: 415px;
    background: rgba(10,14,26,0.9);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 6px;
    overflow: hidden;
    box-shadow: 0 24px 64px rgba(0,0,0,0.75);
    animation: rise 0.4s ease both;
  }
  @keyframes rise {
    from { opacity:0; transform:translateY(18px); }
    to   { opacity:1; transform:translateY(0); }
  }

  .card-head {
    padding: 18px 22px 14px;
    border-bottom: 1px solid rgba(255,255,255,0.07);
    display: flex; align-items: center; gap: 12px;
  }
  .ch-icon {
    width:38px; height:38px; border-radius:4px;
    background:rgba(255,255,255,0.07);
    display:flex; align-items:center; justify-content:center;
    font-size:20px; flex-shrink:0;
  }
  .ch-title { font-size:14px; font-weight:700; }
  .ch-sub   { font-size:11px; color:rgba(255,255,255,0.33); margin-top:3px; }

  /* tabs */
  .tabs {
    display: flex;
    border-bottom: 1px solid rgba(255,255,255,0.07);
  }
  .tab {
    flex:1; padding:11px 8px;
    background:transparent; border:none; border-bottom:2px solid transparent;
    font-family:inherit; font-size:13px; font-weight:500;
    color:rgba(255,255,255,0.38); cursor:pointer;
    display:flex; align-items:center; justify-content:center; gap:6px;
    transition:all 0.18s;
  }
  .tab:hover { color:rgba(255,255,255,0.65); background:rgba(255,255,255,0.03); }
  #tu.on { color:#fff; background:rgba(220,68,56,0.15);  border-bottom-color:#dc4438; }
  #td.on { color:#fff; background:rgba(25,118,210,0.15); border-bottom-color:#1976d2; }

  /* panels */
  .panel { display:none; padding:20px 22px; }
  .panel.on { display:block; }

  /* field */
  .f { margin-bottom:13px; }
  .f label {
    display:block; font-size:10px; font-weight:600;
    letter-spacing:0.7px; text-transform:uppercase;
    color:rgba(255,255,255,0.35); margin-bottom:5px;
  }
  .iw { position:relative; }
  .iw span {
    position:absolute; left:11px; top:50%;
    transform:translateY(-50%);
    font-size:13px; opacity:0.35; pointer-events:none;
  }
  .f input {
    width:100%;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.09);
    border-radius:3px;
    padding:10px 12px 10px 32px;
    color:#fff; font-family:inherit; font-size:13px;
    outline:none; transition:border-color 0.18s;
  }
  .f input:focus { border-color:rgba(255,255,255,0.3); }
  .f input::placeholder { color:rgba(255,255,255,0.18); }

  /* submit */
  .sbtn {
    width:100%; padding:11px; margin-top:4px;
    border:none; border-radius:3px;
    font-family:inherit; font-size:13px; font-weight:700;
    color:#fff; cursor:pointer; letter-spacing:0.3px;
    display:flex; align-items:center; justify-content:center; gap:7px;
    transition:filter 0.18s, transform 0.12s;
  }
  .sbtn:hover  { filter:brightness(1.15); }
  .sbtn:active { transform:scale(0.98); }
  .red  { background:#dc4438; }
  .blue { background:#1976d2; }

  /* depot stats */
  .stats { display:flex; gap:7px; margin-bottom:14px; }
  .stat  {
    flex:1; text-align:center;
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.07);
    border-radius:3px; padding:7px 4px;
  }
  .sv { font-size:17px; font-weight:700; color:#1976d2; }
  .sl { font-size:9px; color:rgba(255,255,255,0.28); text-transform:uppercase; letter-spacing:0.4px; margin-top:2px; }

  /* footer */
  .cfoot {
    padding:10px 22px 16px;
    display:flex; justify-content:center; gap:18px;
  }
  .cfoot a { font-size:11px; color:rgba(255,255,255,0.27); text-decoration:none; transition:color 0.18s; }
  .cfoot a:hover { color:rgba(255,255,255,0.65); }

  /* ── BOTTOM BAR ── */
  .bottombar {
    height:62px; flex-shrink:0;
    background:#0c1120;
    border-top:1px solid rgba(255,255,255,0.07);
    display:flex; align-items:center; justify-content:center;
    gap:10px; padding:0 20px;
  }
  .flabel {
    font-size:11px; font-weight:700;
    color:rgba(255,255,255,0.2);
    text-transform:uppercase; letter-spacing:0.5px;
    margin-right:4px;
  }
  .mbtn {
    padding:9px 18px; border:none; border-radius:3px;
    font-family:inherit; font-size:13px; font-weight:600;
    color:#fff; cursor:pointer;
    display:flex; align-items:center; gap:7px;
    transition:filter 0.18s, transform 0.12s;
    letter-spacing:0.2px;
  }
  .mbtn:hover  { filter:brightness(1.15); }
  .mbtn:active { transform:scale(0.97); }
  .mbtn-red   { background:#dc4438; }
  .mbtn-green { background:#2e7d32; }
  .mbtn-blue  { background:#1565c0; }
</style>
</head>
<body>

<!-- animated background — no Leaflet needed -->
<div class="bg">
  <div class="water1"></div>
  <div class="water2"></div>
  <div class="road road1"></div>
  <div class="road road2"></div>
  <div class="road road3"></div>
  <div class="road road4"></div>
</div>
<div class="overlay"></div>

<div class="shell">

  <!-- top bar -->
  <div class="topbar">
    <span class="tb-brand">♻️ WasteTrack</span>
    <span class="tb-sub">Whitefield Waste Management · Bengaluru</span>
    <div class="tb-space"></div>
    <div class="tb-dot"></div>
    <span class="tb-live">LIVE</span>
  </div>

  <!-- card -->
  <div class="center">
    <div class="card">

      <div class="card-head">
        <div class="ch-icon">🗺️</div>
        <div>
          <div class="ch-title">Route Optimization System</div>
          <div class="ch-sub">Real-time Fleet &amp; Waste Collection Tracking</div>
        </div>
      </div>

      <div class="tabs">
        <button class="tab on" id="tu" onclick="sw('user')">🚛 User — Track Vehicle</button>
        <button class="tab"    id="td" onclick="sw('depot')">🏭 Depot Dashboard</button>
      </div>

      <!-- USER -->
      <div class="panel on" id="pu">
        <div class="f">
          <label>Mobile / Email</label>
          <div class="iw"><span>📱</span><input type="text" placeholder="Enter mobile number or email"/></div>
        </div>
        <div class="f">
          <label>Password</label>
          <div class="iw"><span>🔒</span><input type="password" placeholder="Enter password"/></div>
        </div>
        <div class="f">
          <label>Your Zone / Area</label>
          <div class="iw"><span>📍</span><input type="text" placeholder="e.g. Whitefield Zone A"/></div>
        </div>
        <button class="sbtn red" onclick="window.location.href='user_dashboard.html'">🚛 Track My Vehicle</button>
      </div>

      <!-- DEPOT -->
      <div class="panel" id="pd">
        <div class="stats">
          <div class="stat"><div class="sv">12</div><div class="sl">Vehicles</div></div>
          <div class="stat"><div class="sv">4</div><div class="sl">Active</div></div>
          <div class="stat"><div class="sv">87%</div><div class="sl">Coverage</div></div>
          <div class="stat"><div class="sv">8.4t</div><div class="sl">Collected</div></div>
        </div>
        <div class="f">
          <label>Depot / Staff ID</label>
          <div class="iw"><span>🪪</span><input type="text" placeholder="e.g. WF-DEPOT-01"/></div>
        </div>
        <div class="f">
          <label>Password</label>
          <div class="iw"><span>🔒</span><input type="password" placeholder="Enter depot password"/></div>
        </div>
        <button class="sbtn blue" onclick="window.location.href='depot_dashboard.html'">🏭 Open Depot Dashboard</button>
      </div>

      <div class="cfoot">
        <a href="#">Forgot password?</a>
        <a href="#">Register area</a>
        <a href="#">Contact admin</a>
      </div>

    </div>
  </div>

  <!-- bottom bar -->
  <div class="bottombar">
    <span class="flabel">Features</span>
    <button class="mbtn mbtn-red">🚗 Road Network Analysis</button>
    <button class="mbtn mbtn-green">🌿 NDVI Vegetation Analysis</button>
    <button class="mbtn mbtn-blue">📍 Node Mapping</button>
  </div>

</div>

<script>
  function sw(role) {
    document.getElementById('pu').classList.remove('on');
    document.getElementById('pd').classList.remove('on');
    document.getElementById('tu').classList.remove('on');
    document.getElementById('td').classList.remove('on');
    document.getElementById('p' + role[0]).classList.add('on');
    document.getElementById('t' + role[0]).classList.add('on');
  }
</script>
</body>
</html>
