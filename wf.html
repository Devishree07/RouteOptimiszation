<!DOCTYPE html>
<html>
<head>
  <title>Geo Dashboard</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #1a1a2e; }
    #map { height: calc(100vh - 80px); width: 100%; }
    #controls {
      height: 80px; background: #16213e;
      display: flex; align-items: center; justify-content: center; gap: 12px;
    }
    .layer-btn {
      padding: 10px 20px; border: 3px solid transparent; border-radius: 6px;
      cursor: pointer; font-size: 14px; font-weight: bold; color: white;
      transition: all 0.2s; opacity: 0.75;
    }
    #btn-road { background: #c0392b; }
    #btn-ndvi { background: #27ae60; }
    #btn-node { background: #2980b9; }
    .layer-btn.active {
      opacity: 1; border-color: #ffffff;
      box-shadow: 0 0 12px rgba(255,255,255,0.5); transform: scale(1.05);
    }
    #raster-switcher {
      display: none; position: absolute; bottom: 100px; left: 50%;
      transform: translateX(-50%); z-index: 1000;
      background: rgba(22,33,62,0.95); border: 1px solid #27ae60;
      border-radius: 30px; padding: 6px 8px; gap: 6px; align-items: center;
    }
    .rs-btn {
      padding: 5px 14px; border-radius: 20px; border: none; cursor: pointer;
      font-size: 12px; font-weight: bold; background: transparent; color: #aaa; transition: all .2s;
    }
    .rs-btn.active { background: #27ae60; color: white; }
  </style>
</head>
<body>
  <div id="map"></div>
  <!-- Basemap switcher — top right -->
  <div id="basemap-bar" style="
    position:absolute; top:12px; right:12px; z-index:1000;
    background:rgba(22,33,62,0.95); border:1px solid rgba(255,255,255,0.15);
    border-radius:8px; padding:6px 8px; display:flex; gap:6px; align-items:center;
  ">
    <span style="font-size:10px;font-weight:700;color:rgba(255,255,255,0.35);letter-spacing:.4px;margin-right:2px;">MAP</span>
    <button class="bm-btn active" id="bm-road"      onclick="switchBase('road')"      style="padding:5px 12px;border-radius:16px;border:none;cursor:pointer;font-size:11px;font-weight:700;background:#2980b9;color:#fff;transition:all .2s;">🛣 Road</button>
    <button class="bm-btn"        id="bm-satellite" onclick="switchBase('satellite')" style="padding:5px 12px;border-radius:16px;border:none;cursor:pointer;font-size:11px;font-weight:700;background:transparent;color:#aaa;transition:all .2s;">🛰 Satellite</button>
    <button class="bm-btn"        id="bm-dark"      onclick="switchBase('dark')"      style="padding:5px 12px;border-radius:16px;border:none;cursor:pointer;font-size:11px;font-weight:700;background:transparent;color:#aaa;transition:all .2s;">🌑 Dark</button>
  </div>
  <style>
    .bm-btn.active { background:#2980b9 !important; color:#fff !important; }
    .bm-btn:not(.active):hover { color:#fff !important; }
  </style>

  <div id="raster-switcher">
    <button class="rs-btn" onclick="switchRaster(1,this)">🗺 Whitefield</button>
  </div>
  <div id="controls">
    <button class="layer-btn" id="btn-ndvi">🌿 Green Zone Skip Route Optimizer</button>
    <button class="layer-btn" id="btn-node">📍 Node Mapping</button>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"></script>

  var activeRaster = 0;
  var activeRasterLayer = null;

  function switchRaster(idx, btn) {
    if (activeRasterLayer) map.removeLayer(activeRasterLayer);
    rasterLayers[idx].addTo(map);
    activeRasterLayer = rasterLayers[idx];
    activeRasterLayer.bringToFront();
    activeRaster = idx;
    document.querySelectorAll('.rs-btn').forEach(function(b){ b.classList.remove('active'); });
    btn.classList.add('active');
  }

  // Layer groups
  var groups = {
    road: L.layerGroup().addTo(map),
    ndvi: L.layerGroup().addTo(map),
    node: L.layerGroup().addTo(map)
  };

  var defaultStyles = {
    road: { color:'#e74c3c', weight:2.5, opacity:0.8, fillOpacity:0.3 },
    ndvi: { color:'#27ae60', weight:1.5, fillColor:'#2ecc71', fillOpacity:0.35 },
    node: { color:'#2980b9', weight:2, opacity:0.8 }
  };
  var highlightStyles = {
    road: { color:'#ff0000', weight:4.5, opacity:1 },
    ndvi: { color:'#00ff00', weight:3, opacity:1, fillOpacity:0.6 },
    node: { color:'#00aaff', weight:4, opacity:1 }
  };
  var pointStyles = {
    def:  { radius:6, fillColor:'#3498db', color:'#fff', weight:1, fillOpacity:0.85 },
    high: { radius:9, fillColor:'#00aaff', color:'#fff', weight:2, fillOpacity:1 }
  };

  // Add embedded GeoJSON (NDVI group)
  function addEmbedded(data, key) {
    groups[key].addLayer(L.geoJSON(data, {
      style: defaultStyles[key],
      pointToLayer: function(f,ll){ return L.circleMarker(ll, pointStyles.def); },
      onEachFeature: function(f,l){
        var p = f.properties;
        if(p) l.bindPopup(String(p.name||p.id||p.NAME||JSON.stringify(p)));
      }
    }));
  }
  addEmbedded(WHITEFIELD_DATA, 'ndvi');
  addEmbedded(HIGHWAY_DATA,    'ndvi');

  // Load node/road groups from data/ folder
  function clean(data) { delete data.crs; return data; }
  function loadIntoGroup(url, key) {
    fetch(url)
      .then(function(r){ if(!r.ok) throw new Error('404: '+url); return r.json(); })
      .then(function(data){
        data = clean(data);
        groups[key].addLayer(L.geoJSON(data, {
          style: defaultStyles[key],
          pointToLayer: function(f,ll){ return L.circleMarker(ll, pointStyles.def); },
          onEachFeature: function(f,l){
            var p = f.properties;
            if(p) l.bindPopup(String(p.name||p.id||p.NAME||JSON.stringify(p)));
          }
        }));
      })
      .catch(function(e){ console.error('❌', e.message); });
  }

  ['data/whitefield_line.geojson','data/whitefield_line2.geojson',
   'data/whitefield_line3.geojson','data/whitefield_line4.geojson',
   'data/whitefield_line5.geojson'].forEach(function(f){ loadIntoGroup(f,'road'); });

  ['data/loc1.geojson','data/depot.geojson',
   'data/deport_point.geojson'].forEach(function(f){ loadIntoGroup(f,'node'); });

  // Highlight logic
  var activeKey = null;
  function setHighlight(key, on) {
    groups[key].eachLayer(function(gl) {
      if(gl.setStyle) gl.setStyle(on ? highlightStyles[key] : defaultStyles[key]);
      gl.eachLayer && gl.eachLayer(function(inner) {
        if(inner.setStyle) inner.setStyle(on ? pointStyles.high : pointStyles.def);
      });
    });
    if (key === 'ndvi') {
      var sw = document.getElementById('raster-switcher');
      if (on) {
        activeRasterLayer = rasterLayers[activeRaster];
        activeRasterLayer.addTo(map);
        activeRasterLayer.bringToFront();
        sw.style.display = 'flex';
      } else {
        rasterLayers.forEach(function(r){ if(map.hasLayer(r)) map.removeLayer(r); });
        activeRasterLayer = null;
        sw.style.display = 'none';
      }
    }
  }

  function handleBtn(key, btn) {
    if(activeKey === key) {
      setHighlight(key, false); btn.classList.remove('active'); activeKey = null; return;
    }
    if(activeKey) {
      setHighlight(activeKey, false);
      document.querySelectorAll('.layer-btn').forEach(function(b){ b.classList.remove('active'); });
    }
    setHighlight(key, true); btn.classList.add('active'); activeKey = key;
  }

  document.getElementById('btn-road').addEventListener('click', function(){ handleBtn('road',this); });
